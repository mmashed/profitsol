<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT-Отдел.1С — Profitsol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500&family=Unbounded:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Geologica', sans-serif;
      background: #F7F7F5;
      color: #0A0A0A;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      display: grid;
      grid-template-columns: 2fr 1fr;
      min-height: 100vh;
      padding: 64px 72px;
      gap: 48px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ЛЕВАЯ КОЛОНКА */
    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 64px;
    }

    .hero-utp {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(32px, 4vw, 56px);
      font-weight: 600;
      line-height: 1.12;
      letter-spacing: -0.03em;
      color: #0A0A0A;
      max-width: 680px;
    }

    .hero-bottom {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #0A0A0A;
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 16px 32px;
      font-family: 'Geologica', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      width: fit-content;
      transition: opacity 0.2s;
      text-decoration: none;
    }

    .hero-cta:hover { opacity: 0.75; }

    .hero-tagline {
      font-size: 14px;
      font-weight: 300;
      color: #7A7A7A;
      line-height: 1.6;
      max-width: 420px;
    }

    /* ПРАВАЯ КОЛОНКА */
    .hero-right {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      gap: 48px;
    }

    /* ОРБИТА */
    .orbit-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      flex-shrink: 0;
    }

    .orbit-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px dashed #C8C8C2;
    }

    .orbit-item {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
    }

    .orbit-item:nth-child(2) { animation: spin 20s linear infinite; animation-delay: calc(-0 * 20s / 7); }
    .orbit-item:nth-child(3) { animation: spin 20s linear infinite; animation-delay: calc(-1 * 20s / 7); }
    .orbit-item:nth-child(4) { animation: spin 20s linear infinite; animation-delay: calc(-2 * 20s / 7); }
    .orbit-item:nth-child(5) { animation: spin 20s linear infinite; animation-delay: calc(-3 * 20s / 7); }
    .orbit-item:nth-child(6) { animation: spin 20s linear infinite; animation-delay: calc(-4 * 20s / 7); }
    .orbit-item:nth-child(7) { animation: spin 20s linear infinite; animation-delay: calc(-5 * 20s / 7); }
    .orbit-item:nth-child(8) { animation: spin 20s linear infinite; animation-delay: calc(-6 * 20s / 7); }

    @keyframes spin {
      from { transform: rotate(0deg)   translateX(160px) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(160px) rotate(-360deg); }
    }

    .orbit-label {
      position: absolute;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      background: #fff;
      border: 1px solid #E4E4E0;
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 400;
      color: #0A0A0A;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      pointer-events: none;
    }

    .hero-price {
      font-family: 'Unbounded', sans-serif;
      font-size: 30px;
      font-weight: 500;
      color: #0A0A0A;
      letter-spacing: -0.02em;
      margin-top: 16px;
    }

    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
        padding: 40px 24px;
        min-height: auto;
        gap: 48px;
      }
      .hero-right { gap: 32px; }
      .hero-left  { gap: 48px; }
    }
  </style>
</head>
<body>

  <section class="hero">

    <div class="hero-left">
      <h1 class="hero-utp">
        Интеграция, настройка и сопровождение 1С для оптовой торговли и дистрибуции.
      </h1>
      <div class="hero-bottom">
        <a href="#contact" class="hero-cta">
          Обсудим интеграцию и бесплатный аудит?
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <p class="hero-tagline">
          выделенный постоянный инженер, фиксируем время ответа, оплата по количеству часов.
        </p>
      </div>
    </div>

    <div class="hero-right">
      <div class="orbit-wrapper">
        <div class="orbit-ring"></div>
        <div class="orbit-item"><span class="orbit-label">1С: УТ</span></div>
        <div class="orbit-item"><span class="orbit-label">1С: КА</span></div>
        <div class="orbit-item"><span class="orbit-label">1С: УНФ</span></div>
        <div class="orbit-item"><span class="orbit-label">1С: Розница</span></div>
        <div class="orbit-item"><span class="orbit-label">1С: Документооборот</span></div>
        <div class="orbit-item"><span class="orbit-label">1С: Бухгалтерия</span></div>
        <div class="orbit-item"><span class="orbit-label">1С: ЗУП</span></div>
      </div>
      <p class="hero-price">от 85 000 ₽/мес.</p>
    </div>

  </section>

</body>
</html>
